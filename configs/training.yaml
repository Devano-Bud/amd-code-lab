# General training config
# Used by bug_detector and code_summarizer

model_name: "microsoft/codebert-base"
dataset: "code_x_glue_tc_defect_detection"
text_column: "func"
max_length: 512
output_dir: "./checkpoints/bug-detector"
fp16: true

training:
  epochs: 5
  batch_size: 16
  eval_batch_size: 32
  lr: 2e-5
  warmup_steps: 200
  logging_steps: 50
  eval_steps: 500
  save_steps: 500
