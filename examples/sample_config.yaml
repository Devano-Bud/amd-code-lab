# Code LLM Lab — Example Configurations

## CodeGen-350M LoRA Fine-Tuning

```yaml
# configs/codegen_lora_example.yaml
model:
  name: Salesforce/codegen-350M-mono
  max_length: 512
  torch_dtype: float16  # Use float16 on GPU; float32 on CPU

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - qkv_proj
    - out_proj
    - fc1
    - fc2

training:
  output_dir: ./checkpoints/codegen-lora-example
  num_epochs: 3
  batch_size: 4          # Safe for 16GB VRAM
  gradient_accumulation_steps: 4  # Effective batch = 16
  learning_rate: 2.0e-4
  warmup_steps: 100
  logging_steps: 10
  save_steps: 500
  fp16: true
  bf16: false            # Set true only on gfx1100+

data:
  dataset: code_search_net  # Or your custom dataset
  language: python
  split: train
  num_samples: 10000
```

## Sample Input: Code Completion

**Prompt:**
```python
def fibonacci(n: int) -> list[int]:
    """Generate the first n Fibonacci numbers."""
    if n <= 0:
        return []
    if n == 1:
        return [0]
```

**Expected model output (CodeGen-350M, after LoRA):**
```python
    fib = [0, 1]
    for i in range(2, n):
        fib.append(fib[i-1] + fib[i-2])
    return fib[:n]
```

## Sample Input: Bug Detection

**Input (buggy code):**
```python
def calculate_average(numbers):
    total = sum(numbers)
    return total / len(numbers)  # Bug: no zero-division check
```

**Expected classification:**
```
Label: BUG
Reason: Potential ZeroDivisionError when numbers is empty.
Confidence: 0.94
Suggested fix: Add len(numbers) > 0 guard
```

## Sample Input: Code Summarization

**Input:**
```python
def merge_sort(arr):
    if len(arr) <= 1:
        return arr
    mid = len(arr) // 2
    left = merge_sort(arr[:mid])
    right = merge_sort(arr[mid:])
    return merge(left, right)
```

**Expected summary:**
```
Recursively sorts an array using the merge sort algorithm.
Splits the input array in half, sorts each half, then merges them.
Time complexity: O(n log n). Space complexity: O(n).
```

